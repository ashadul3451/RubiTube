<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RubiTube</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="video-container">
<div class="logo">RubiTube</div>
<video id="videoPlayer" autoplay muted loop controls>
<source src="video.mp4" type="video/mp4">
</video>

<button class="video-btn" onclick="nextVideo()">Next Video</button>

<div class="right-menu">
<div class="like">❤️</div>
<div class="like-count">1200</div>

<div>💬<br>250</div>
<div class="share-btn">📤<br>Share</div>
<div class="follow-btn">👤<br>Follow</div>
</div>

<div class="bottom-text">
<h3>@RubiTube</h3>
<p>Watch • Share • Enjoy 🚀</p>
</div>

<div class="comment-box">
  <input type="text" id="commentInput" placeholder="Write a comment...">
  <button onclick="addComment()">Send</button>
  <div id="comments"></div>
</div>

</div>
<div class="navbar">
  <div>🏠<br>Home</div>
  <div>➕<br>Upload</div>
  <div>👤<br>Profile</div>
</div>
<script src="script.js"></script>

</body>
</html>
